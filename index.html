<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zeka Oyunu v8.0</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --p: #7d5fff; --s: #3ae374; --e: #ff4d4d; --bg: #050505; --card: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; background-image: radial-gradient(circle at 20% 30%, #1e1e2f 0%, #050505 100%); }
        .glass-card { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; width: 420px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        input { background: rgba(255,255,255,0.1); border: 1px solid #444; padding: 12px; border-radius: 12px; color: white; width: 85%; margin-bottom: 15px; outline: none; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-start { background: var(--p); color: white; width: 90%; font-size: 1.1rem; }
        .leaderboard { position: fixed; top: 20px; right: 20px; background: var(--card); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); min-width: 240px; }
        .rank-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        /* GİZLİ ADMİN ALANI */
        .ghost-trigger { position: fixed; bottom: 0; left: 0; width: 50px; height: 50px; cursor: default; z-index: 9999; opacity: 0; }
        .admin-modal { display: none; position: fixed; bottom: 60px; left: 20px; background: #1a1a2e; padding: 15px; border-radius: 15px; border: 1px solid var(--p); width: 220px; z-index: 10000; box-shadow: 0 0 30px var(--p); }
        .adm-btn { width: 100%; margin: 3px 0; font-size: 0.7rem; padding: 10px; background: var(--p); color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 15px; margin: 8px 0; cursor: pointer; width: 100%; text-align: left; transition: 0.2s; }
        .option-btn:hover { background: var(--p); transform: translateX(10px); }
        #timer { font-size: 3.5rem; font-weight: 900; color: #ff9f43; text-shadow: 0 0 10px #ff9f43; }
    </style>
</head>
<body>

    <div class="leaderboard"><h3 style="margin:0; color: var(--s); text-align:center;">🌍 GLOBAL ARENA</h3><div id="lb-list">Yükleniyor...</div></div>

    <!-- GİZLİ ADMİN TETİKLEYİCİ (Sol Altta Görünmez Alan) -->
    <div class="ghost-trigger" id="g-trigger"></div>
    
    <div id="admin-modal" class="admin-modal">
        <p style="margin:0 0 10px 0; font-size:0.7rem; color:var(--p)">SİSTEM ERİŞİMİ</p>
        <input type="password" id="admin-pass" placeholder="Kod..." style="width:90%; padding:8px; font-size:0.7rem;">
        <button onclick="authAdmin()" class="btn" style="width:100%; font-size:0.7rem; padding:5px; margin-bottom:10px;">DOĞRULA</button>
        <div id="admin-tools" style="display:none">
            <button onclick="score+=500; updateUI()" class="adm-btn">+500 PUAN</button>
            <button onclick="combo+=10; updateUI()" class="adm-btn">KOMBO X10</button>
            <button onclick="index++; loadQ()" class="adm-btn" style="background:#f1c40f; color:black">SORU ATLA</button>
            <button onclick="db.ref('scores').remove(); location.reload()" class="adm-btn" style="background:var(--e)">GLOBALİ SIFIRLA</button>
        </div>
        <button onclick="document.getElementById('admin-modal').style.display='none'" style="background:none; border:none; color:gray; cursor:pointer; font-size:0.6rem; width:100%; margin-top:5px;">KAPAT</button>
    </div>

    <div class="glass-card">
        <div id="login-view">
            <h1 style="letter-spacing: 5px;">ZEKA OYUNU</h1>
            <p style="opacity:0.6">Aynı isimle sadece bir efsane doğar!</p>
            <input type="text" id="username" placeholder="Savaşçı İsmi..." maxlength="12">
            <button class="btn btn-start" onclick="initGame()">BAŞLA</button>
        </div>
        <div id="game-view" style="display:none">
            <div id="timer">20</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span id="score-text" style="color:var(--s); font-weight:bold; font-size:1.2rem;">Puan: 0</span>
                <span id="combo-text" style="color:#ff9f43; font-weight:bold;"></span>
            </div>
            <h2 id="question-text" style="min-height:80px; font-size:1.3rem;"></h2>
            <div id="options-grid"></div>
        </div>
    </div>

<script>
    // ŞİFRE MASKESİ (vardarailesi'nin kodlanmış hali)
    const SECRET_KEY = "dmFyZGFyYWlsZXNp"; // Base64 ile gizledik knk ;)

    const firebaseConfig = { databaseURL: "https://firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentPlayer = "", score = 0, index = 0, timer, timeLeft = 20, combo = 0, globalRanks = [];

    const questions = [
        { q: "Babanızın erkek kardeşi sizin neyinizdir?", a: ["Amca", "Dayı", "Enişte"], r: "Amca" },
        { q: "Annenizin kız kardeşi sizin neyinizdir?", a: ["Hala", "Teyze", "Yenge"], r: "Teyze" },
        { q: "Ablanızın kocasına ne dersiniz?", a: ["Enişte", "Görümce", "Kayın"], r: "Enişte" },
        { q: "Dayınızın çocuğu sizin neyiniz olur?", a: ["Kuzen", "Yeğen", "Kardeş"], r: "Kuzen" },
        { q: "Babanızın kız kardeşi sizin neyinizdir?", a: ["Teyze", "Hala", "Yenge"], r: "Hala" },
        { q: "Anneannenizin kızı sizin neyiniz olabilir?", a: ["Anneniz veya Teyzeniz", "Halanız", "Yengeniz"], r: "Anneniz veya Teyzeniz" },
        { q: "ALTIN SORU: Babanızın annesi sizin neyinizdir?", a: ["Anneanne", "Babaanne", "Hala"], r: "Babaanne" }
    ];

    // GİZLİ TIKLAMA SAYACI
    let clickCount = 0;
    document.getElementById("g-trigger").onclick = function() {
        clickCount++;
        if(clickCount >= 3) {
            document.getElementById("admin-modal").style.display = "block";
            clickCount = 0;
        }
        setTimeout(() => clickCount = 0, 2000); // 2 saniyede basmazsan sıfırlanır
    };

    db.ref("scores").on("value", (snap) => {
        globalRanks = []; snap.forEach(c => globalRanks.push(c.val()));
        globalRanks.sort((a,b) => b.pts - a.pts);
        let html = "";
        globalRanks.slice(0, 10).forEach((r, i) => html += `<div class="rank-row"><span>${i+1}. ${r.name}</span><b>${r.pts}</b></div>`);
        document.getElementById("lb-list").innerHTML = html || "Rekor yok!";
    });

    function authAdmin() {
        // Maskelenmiş şifreyi çözüp kontrol ediyoruz
        if(document.getElementById("admin-pass").value === atob(SECRET_KEY)) {
            document.getElementById("admin-tools").style.display = "block";
            alert("Erişim Onaylandı.");
        } else { alert("Hatalı Kod."); }
    }

    function initGame() {
        const name = document.getElementById("username").value.trim();
        if(!name) return;
        if(globalRanks.some(r => r.name.toLowerCase() === name.toLowerCase())) {
            alert("Bu isimle daha önce biri yarışmış!");
            return;
        }
        currentPlayer = name;
        document.getElementById("login-view").style.display = "none";
        document.getElementById("game-view").style.display = "block";
        loadQ();
    }

    function loadQ() {
        if(score <= -100) return finish("ELENDİN! 💀");
        if(index >= questions.length) return finish("ZAFER! 🏆");

        const q = questions[index];
        document.getElementById("question-text").innerText = q.q;
        const grid = document.getElementById("options-grid");
        grid.innerHTML = "";
        q.a.forEach(opt => {
            const b = document.createElement("button");
            b.className = "option-btn"; b.innerText = opt;
            b.onclick = () => {
                clearInterval(timer);
                if(opt === q.r) { combo++; score += 20 + (combo * 5); } 
                else { combo = 0; score -= 15; }
                index++; updateUI(); loadQ();
            };
            grid.appendChild(b);
        });

        timeLeft = 20;
        document.getElementById("timer").innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--; document.getElementById("timer").innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timer); score -= 10; index++; loadQ(); updateUI(); }
        }, 1000);
    }

    function updateUI() {
        document.getElementById("score-text").innerText = `Puan: ${score}`;
        document.getElementById("score-text").style.color = score < 0 ? "var(--e)" : "var(--s)";
        document.getElementById("combo-text").innerText = combo > 1 ? `KOMBO X${combo} 🔥` : "";
    }

    function finish(msg) {
        clearInterval(timer);
        db.ref("scores").push({ name: currentPlayer, pts: score });
        document.getElementById("game-view").innerHTML = `<h1>${msg}</h1><button class="btn btn-start" onclick="location.reload()">ANASAYFA</button>`;
    }
</script>
</body>
</html>
